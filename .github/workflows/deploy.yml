name: Deploy SPA to S3 + CloudFront

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "输入 DEPLOY 以确认将当前代码发布到生产环境"
        required: true
        type: string

jobs:
  build-and-deploy:
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_PRIMARY: ${{ secrets.S3_BUCKET_PRIMARY }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static assets (long cache, no delete)
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET_PRIMARY}" \
            --exclude "index.html" \
            --exclude "favicon.svg" \
            --exclude "favicon.ico" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload favicon (medium cache)
        run: |
          if [ -f dist/favicon.svg ]; then
            aws s3 cp dist/favicon.svg "s3://${S3_BUCKET_PRIMARY}/favicon.svg" \
              --cache-control "public,max-age=86400" \
              --content-type "image/svg+xml"
          fi
          if [ -f dist/favicon.ico ]; then
            aws s3 cp dist/favicon.ico "s3://${S3_BUCKET_PRIMARY}/favicon.ico" \
              --cache-control "public,max-age=86400" \
              --content-type "image/x-icon"
          fi

      - name: Upload index.html (no-store)
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET_PRIMARY}/index.html" \
            --cache-control "no-store" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

